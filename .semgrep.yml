rules: []
# Repo-level semgrep config. The `rules: []` keeps semgrep happy as a config
# file; the real suppressions live in:
#
#   - inline `# nosemgrep: <rule-id>` comments at confirmed false-positive
#     sites (preserved across runs)
#   - this section, which lists rules excluded fleet-wide because EVERY hit
#     in the repo is a false positive. Each exclusion is justified.
#
# To add a project-wide exclusion, list the rule ID in `--exclude-rule` on
# the semgrep CLI, or in the CI runner's config that wraps semgrep.
#
# Rules excluded from this repo:
#
#   javascript.lang.best-practice.react.jsx-not-internationalized
#       Internal AWS operator dashboard, English-only audience. i18n is
#       not a product requirement. Drop this exclusion if a future tab
#       needs translation.
#
#   python.lang.best-practice.unspecified-open-encoding
#       Build/ingestion scripts open files Python defaults to UTF-8 on.
#       Adding `encoding="utf-8"` everywhere is busywork.
#
# Path exclusions are honored by semgrep CLI directly:
paths:
  exclude:
    - frontend/dist/
    - frontend/node_modules/
    - "**/__pycache__/"
    - .deploy-stack-name
