AWSTemplateFormatVersion: '2010-09-09'
Description: Bedrock Ops Review MCP Server - Lambda Function URL with IAM auth

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package
  S3Key:
    Type: String
    Description: S3 key for the Lambda deployment package
  AwsRegion:
    Type: String
    Default: us-east-1
    Description: AWS region for Bedrock and CloudWatch APIs

Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockOpsReviewAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:ListInferenceProfiles
                  - bedrock:GetModelInvocationLoggingConfiguration
                Resource: '*'
              - Effect: Allow
                Action:
                  - servicequotas:ListServiceQuotas
                  - servicequotas:ListAWSDefaultServiceQuotas
                  - servicequotas:GetServiceQuota
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:ListMetrics
                  - cloudwatch:GetMetricStatistics
                Resource: '*'

  MCPFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock-ops-review-mcp
      Runtime: python3.12
      Handler: lambda_handler.handler
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Role: !GetAtt LambdaRole.Arn
      Timeout: 900
      MemorySize: 512
      Architectures:
        - arm64
      Environment:
        Variables:
          AWS_REGION_OVERRIDE: !Ref AwsRegion
          FASTMCP_LOG_LEVEL: ERROR

  MCPFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM
      TargetFunctionArn: !Ref MCPFunction
      InvokeMode: BUFFERED

Outputs:
  MCPEndpoint:
    Description: MCP Server Function URL (IAM auth required)
    Value: !Sub ${MCPFunctionUrl.FunctionUrl}mcp
  FunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt MCPFunctionUrl.FunctionUrl
  FunctionArn:
    Description: Lambda Function ARN (use this for cross-account access grants)
    Value: !GetAtt MCPFunction.Arn
