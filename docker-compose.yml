services:
  postgres:
    image: postgres:15-alpine
    container_name: bedrock-lens-pg
    environment:
      POSTGRES_USER: bedrock_lens
      POSTGRES_PASSWORD: bedrock_lens_dev
      POSTGRES_DB: bedrock_lens
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bedrock_lens -d bedrock_lens"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bedrock-lens-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
